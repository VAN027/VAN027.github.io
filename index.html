<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>电视挂架打孔计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        canvas { max-width: 100%; height: auto; display: block; }
        .input-group input { min-height: 48px; }
        table { min-width: 100%; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6">
        <!-- 极简头部 -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">电视挂架打孔计算器</h1>
                <p class="text-gray-500 text-xs sm:text-sm mt-1">输入 → 自动计算 → 实时预览</p>
            </div>
            <div class="flex gap-3">
                <button onclick="resetForm()" 
                        class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-xs sm:text-sm font-medium rounded-2xl flex items-center gap-2 transition">
                    重置
                </button>
                <button onclick="exportResults()" 
                        class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs sm:text-sm font-medium rounded-2xl flex items-center gap-2 transition">
                    导出
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
            
            <!-- 左侧输入（手机优先垂直布局，加大间距） -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow shadow-gray-200 p-6 sm:p-8">
                <h2 class="text-lg font-semibold mb-6 text-gray-800">参数设置</h2>
                
                <!-- 基本参数 -->
                <div class="mb-8">
                    <div class="text-xs uppercase tracking-widest text-gray-500 mb-3">基本参数</div>
                    <div class="grid grid-cols-2 gap-4 sm:gap-6">
                        <div class="input-group">
                            <label class="block text-xs text-gray-500 mb-1">背景墙长度 (cm)</label>
                            <input id="wall" type="number" step="0.1" value="300" 
                                   class="w-full px-4 py-4 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                        <div class="input-group">
                            <label class="block text-xs text-gray-500 mb-1">电视机长度 (cm)</label>
                            <input id="tvLen" type="number" step="0.1" value="120" 
                                   class="w-full px-4 py-4 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                        <div class="input-group">
                            <label class="block text-xs text-gray-500 mb-1">电视底端高度 H (cm)</label>
                            <input id="H" type="number" step="0.1" value="60" 
                                   class="w-full px-4 py-4 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                        <div class="input-group">
                            <label class="block text-xs text-gray-500 mb-1">电视高度 (预览 cm)</label>
                            <input id="tvHeight" type="number" step="0.1" value="65" 
                                   class="w-full px-4 py-4 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                    </div>
                </div>

                <!-- 挂架偏移（手机端表格自动横向滚动，加大行高） -->
                <div>
                    <div class="text-xs uppercase tracking-widest text-gray-500 mb-3">挂架偏移参数</div>
                    <div class="overflow-x-auto rounded-2xl border border-gray-100">
                        <table class="w-full text-sm border-collapse min-w-[360px]">
                            <thead>
                                <tr class="border-b border-gray-100">
                                    <th class="text-left py-4 px-4 font-medium text-gray-500">挂架类型</th>
                                    <th class="text-center py-4 px-4 font-medium text-gray-500">水平 (cm)</th>
                                    <th class="text-center py-4 px-4 font-medium text-gray-500">垂直 (cm)</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr>
                                    <td class="py-5 px-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-7 h-7 bg-red-500 rounded-lg flex items-center justify-center text-white text-xs font-bold">普</div>
                                            <span class="font-medium text-gray-700">普通挂架</span>
                                        </div>
                                    </td>
                                    <td class="px-4"><input id="VX" type="number" step="0.1" value="10" 
                                           class="w-20 sm:w-24 mx-auto px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                           oninput="liveUpdate()"></td>
                                    <td class="px-4"><input id="VY" type="number" step="0.1" value="15" 
                                           class="w-20 sm:w-24 mx-auto px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                           oninput="liveUpdate()"></td>
                                </tr>
                                <tr>
                                    <td class="py-5 px-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-7 h-7 bg-blue-500 rounded-lg flex items-center justify-center text-white text-xs font-bold">左</div>
                                            <span class="font-medium text-gray-700">左超薄挂架</span>
                                        </div>
                                    </td>
                                    <td class="px-4"><input id="VX1" type="number" step="0.1" value="8" 
                                           class="w-20 sm:w-24 mx-auto px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                           oninput="liveUpdate()"></td>
                                    <td class="px-4"><input id="VY1" type="number" step="0.1" value="12" 
                                           class="w-20 sm:w-24 mx-auto px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                           oninput="liveUpdate()"></td>
                                </tr>
                                <tr>
                                    <td class="py-5 px-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-7 h-7 bg-green-500 rounded-lg flex items-center justify-center text-white text-xs font-bold">右</div>
                                            <span class="font-medium text-gray-700">右超薄挂架</span>
                                        </div>
                                    </td>
                                    <td class="px-4"><input id="VX2" type="number" step="0.1" value="112" 
                                           class="w-20 sm:w-24 mx-auto px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                           oninput="liveUpdate()"></td>
                                    <td class="px-4"><input id="VY2" type="number" step="0.1" value="12" 
                                           class="w-20 sm:w-24 mx-auto px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                           oninput="liveUpdate()"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 右侧预览 + 结果（手机端加大间距，画布自适应） -->
            <div class="lg:col-span-7 space-y-8">
                
                <!-- 实时预览 -->
                <div class="bg-white rounded-3xl shadow shadow-gray-200 p-6 sm:p-8">
                    <div class="flex items-center justify-between mb-5">
                        <h2 class="text-lg font-semibold text-gray-800">实时预览</h2>
                        <span id="scaleInfo" class="px-4 py-1 bg-gray-100 text-xs rounded-full text-gray-500"></span>
                    </div>
                    <div id="canvasContainer" class="w-full">
                        <canvas id="canvas" width="820" height="460" class="rounded-2xl shadow-inner"></canvas>
                    </div>
                    
                    <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 mt-6 text-xs text-gray-600">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                            <span>普通 (VX/VY)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                            <span>左超薄 (VX1/VY1)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                            <span>右超薄 (VX2/VY2)</span>
                        </div>
                    </div>
                </div>

                <!-- 计算结果 -->
                <div class="bg-white rounded-3xl shadow shadow-gray-200 p-6 sm:p-8">
                    <h2 class="text-lg font-semibold mb-5 text-gray-800">计算结果</h2>
                    <div id="results" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <!-- JS 动态填充 -->
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center text-[10px] text-gray-400">
            手机专属优化 · 画布自适应 · 大触控区 · 垂直间距加大
        </div>
    </div>

    <script>
        // ==================== 计算模块 ====================
        function calculatePositions(wall, tvLen, H, VX, VY, VX1, VY1, VX2, VY2) {
            if (!wall || !tvLen) return null;
            const X = (wall - tvLen) / 2;
            const Y = H;
            return {
                tv: { X: X.toFixed(2), Y: Y.toFixed(2) },
                ordinary: { X1: (X + VX).toFixed(2), Y1: (Y + VY).toFixed(2) },
                leftUltra: { LX: (X + VX1).toFixed(2), LY: (Y + VY1).toFixed(2) },
                rightUltra: { RX: (X + VX2).toFixed(2), RY: (Y + VY2).toFixed(2) }
            };
        }

        // ==================== 响应式画布模块 ====================
        let canvas, ctx;
        
        function resizeAndDraw(pos, tvLen, tvHeight, wall, VX, VY, VX1, VY1, VX2, VY2) {
            if (!pos) return;
            
            const container = document.getElementById('canvasContainer');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            // 自适应尺寸（手机端完美适配）
            const maxWidth = Math.min(container.clientWidth, 820);
            const ratio = 460 / 820;
            canvas.width = maxWidth;
            canvas.height = maxWidth * ratio;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const marginL = 55;
            const marginB = 75;
            const drawW = canvas.width - 110;
            const drawH = canvas.height - 110;
            
            const maxHeight = Math.max(parseFloat(pos.tv.Y) + parseFloat(tvHeight) + 50, 200);
            const scaleX = drawW / wall;
            const scaleY = drawH / maxHeight;
            const groundY = canvas.height - marginB;

            // 背景墙 + 地面
            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(marginL, groundY - maxHeight * scaleY, drawW, maxHeight * scaleY);
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 3.5;
            ctx.beginPath(); ctx.moveTo(marginL-10, groundY); ctx.lineTo(marginL+drawW+10, groundY); ctx.stroke();

            // 电视机
            const tvRefX = marginL + parseFloat(pos.tv.X) * scaleX;
            const tvBottom = groundY - parseFloat(pos.tv.Y) * scaleY;
            const tvH = parseFloat(tvHeight) * scaleY;
            const tvW = tvLen * scaleX;
            ctx.fillStyle = '#e0f2fe'; ctx.fillRect(tvRefX, tvBottom - tvH, tvW, tvH);
            ctx.strokeStyle = '#0369a1'; ctx.lineWidth = 5; ctx.strokeRect(tvRefX, tvBottom - tvH, tvW, tvH);
            ctx.fillStyle = '#0369a1'; ctx.font = 'bold 14px Noto Sans SC'; ctx.textAlign = 'center';
            ctx.fillText('电视机', tvRefX + tvW/2, tvBottom - tvH - 12);

            // 打孔点
            const drawPoint = (x, y, color, label) => {
                const sx = marginL + parseFloat(x) * scaleX;
                const sy = groundY - parseFloat(y) * scaleY;
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(sx, sy, 8.5, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(sx, sy, 8.5, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = '#1f2937'; ctx.font = '600 13px Noto Sans SC'; ctx.textAlign = 'left';
                ctx.fillText(label, sx + 18, sy + 5);
            };
            drawPoint(pos.ordinary.X1, pos.ordinary.Y1, '#ef4444', '普通');
            drawPoint(pos.leftUltra.LX, pos.leftUltra.LY, '#3b82f6', '左超薄');
            drawPoint(pos.rightUltra.RX, pos.rightUltra.RY, '#22c55e', '右超薄');

            // 偏移线 + 数据
            const drawHLine = (startX, endX, y, color, txt) => {
                ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
                ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = color; ctx.font = 'bold 13px Noto Sans SC'; ctx.textAlign = 'center';
                ctx.fillText(txt, (startX + endX)/2, y - 11);
            };
            const drawVLine = (x, startY, endY, color, txt) => {
                ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
                ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = color; ctx.font = 'bold 13px Noto Sans SC'; ctx.textAlign = 'left';
                ctx.fillText(txt, x + 9, (startY + endY)/2);
            };

            const tvX = tvRefX;
            const ordX = marginL + parseFloat(pos.ordinary.X1)*scaleX;
            const ordY = groundY - parseFloat(pos.ordinary.Y1)*scaleY;
            const leftX = marginL + parseFloat(pos.leftUltra.LX)*scaleX;
            const leftY = groundY - parseFloat(pos.leftUltra.LY)*scaleY;
            const rightX = marginL + parseFloat(pos.rightUltra.RX)*scaleX;
            const rightY = groundY - parseFloat(pos.rightUltra.RY)*scaleY;

            drawHLine(tvX, ordX, tvBottom, '#ef4444', `VX=${VX}`);
            drawVLine(ordX, tvBottom, ordY, '#ef4444', `VY=${VY}`);
            drawHLine(tvX, leftX, tvBottom, '#3b82f6', `VX1=${VX1}`);
            drawVLine(leftX, tvBottom, leftY, '#3b82f6', `VY1=${VY1}`);
            drawHLine(tvX, rightX, tvBottom, '#22c55e', `VX2=${VX2}`);
            drawVLine(rightX, tvBottom, rightY, '#22c55e', `VY2=${VY2}`);

            document.getElementById('scaleInfo').textContent = `1cm ≈ ${scaleX.toFixed(1)}px`;
        }

        // ==================== 结果模块 ====================
        function renderResults(pos) {
            document.getElementById('results').innerHTML = `
                <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6">
                    <div class="text-xs text-blue-600 mb-1">电视左下角</div>
                    <div class="text-4xl font-semibold text-blue-900">${pos.tv.X} <span class="text-base font-normal text-gray-400">cm</span></div>
                    <div class="text-xs text-gray-500 mt-2">Y = ${pos.tv.Y} cm</div>
                </div>
                
                <div class="bg-red-50 border border-red-100 rounded-2xl p-6">
                    <div class="flex gap-2 items-center mb-3">
                        <div class="w-4 h-4 bg-red-500 rounded"></div>
                        <div class="text-xs text-red-600">普通挂架</div>
                    </div>
                    <div class="text-base space-y-1">
                        <div>X1 = ${pos.ordinary.X1} cm</div>
                        <div>Y1 = ${pos.ordinary.Y1} cm</div>
                    </div>
                </div>
                
                <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6">
                    <div class="flex gap-2 items-center mb-3">
                        <div class="w-4 h-4 bg-blue-500 rounded"></div>
                        <div class="text-xs text-blue-600">左超薄挂架</div>
                    </div>
                    <div class="text-base space-y-1">
                        <div>LX = ${pos.leftUltra.LX} cm</div>
                        <div>LY = ${pos.leftUltra.LY} cm</div>
                    </div>
                </div>
                
                <div class="bg-green-50 border border-green-100 rounded-2xl p-6">
                    <div class="flex gap-2 items-center mb-3">
                        <div class="w-4 h-4 bg-green-500 rounded"></div>
                        <div class="text-xs text-green-600">右超薄挂架</div>
                    </div>
                    <div class="text-base space-y-1">
                        <div>RX = ${pos.rightUltra.RX} cm</div>
                        <div>RY = ${pos.rightUltra.RY} cm</div>
                    </div>
                </div>
            `;
        }

        // ==================== 主逻辑 + 手机适配 ====================
        function liveUpdate() {
            const wall = parseFloat(document.getElementById('wall').value) || 0;
            const tvLen = parseFloat(document.getElementById('tvLen').value) || 0;
            const H = parseFloat(document.getElementById('H').value) || 60;
            const VX = parseFloat(document.getElementById('VX').value) || 0;
            const VY = parseFloat(document.getElementById('VY').value) || 0;
            const VX1 = parseFloat(document.getElementById('VX1').value) || 0;
            const VY1 = parseFloat(document.getElementById('VY1').value) || 0;
            const VX2 = parseFloat(document.getElementById('VX2').value) || 0;
            const VY2 = parseFloat(document.getElementById('VY2').value) || 0;
            const tvHeight = parseFloat(document.getElementById('tvHeight').value) || 65;

            const pos = calculatePositions(wall, tvLen, H, VX, VY, VX1, VY1, VX2, VY2);
            if (pos) {
                renderResults(pos);
                resizeAndDraw(pos, tvLen, tvHeight, wall, VX, VY, VX1, VY1, VX2, VY2);
            }
        }

        function resetForm() {
            document.getElementById('wall').value = 300;
            document.getElementById('tvLen').value = 120;
            document.getElementById('H').value = 60;
            document.getElementById('tvHeight').value = 65;
            document.getElementById('VX').value = 10;
            document.getElementById('VY').value = 15;
            document.getElementById('VX1').value = 8;
            document.getElementById('VY1').value = 12;
            document.getElementById('VX2').value = 112;
            document.getElementById('VY2').value = 12;
            liveUpdate();
        }

        function exportResults() {
            const text = `电视挂架打孔结果\n\n${document.getElementById('results').innerText}\n生成时间：${new Date().toLocaleString('zh-CN')}`;
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `挂架打孔_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            alert('✅ 已导出！（预览截图请长按画布或使用手机截屏）');
        }

        // ==================== 初始化 + 手机窗口变化适配 ====================
        window.onload = () => {
            liveUpdate();
            
            // 手机旋转/窗口变化时自动刷新画布
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(liveUpdate, 80);
            });
            
            // 支持键盘回车
            document.addEventListener('keydown', e => { if (e.key === 'Enter') liveUpdate(); });
        };
    </script>
</body>
</html>
