<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电视机挂架 · 打孔定位计算器</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f1f5f9;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .calculator {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #475569;
            margin-left: auto;
        }
        .sub {
            color: #334155;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            background: #f8fafc;
            border-radius: 0 1rem 1rem 0;
            line-height: 1.5;
            font-size: 0.95rem;
            margin: 1rem 0 1.8rem 0;
        }
        .input-panel {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem 2rem;
            align-items: flex-end;
        }
        .input-group {
            flex: 1 1 180px;
            min-width: 160px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #475569;
            margin-bottom: 0.4rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            font-size: 1rem;
            background: white;
            transition: 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            ring: 3px solid #93c5fd;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .input-group .unit-hint {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.25rem;
        }
        .tv-coord {
            background: #e6f0ff;
            padding: 1rem 1.8rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #b9d3fd;
        }
        .tv-coord span {
            font-weight: 500;
            color: #0c4a6e;
        }
        .tv-coord .coord-value {
            background: white;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 1.2rem;
            color: #1e40af;
            margin-left: 0.75rem;
            border: 1px solid #a5c9ff;
        }
        .mount-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 1.5rem;
            margin: 1.8rem 0 1rem;
        }
        .mount-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem 1.5rem;
            border: 1px solid #e9eef3;
            box-shadow: 0 4px 8px -2px rgba(0,0,0,0.05);
            transition: all 0.1s;
        }
        .mount-card:hover {
            border-color: #b9d3fd;
            box-shadow: 0 10px 15px -6px #b0cdfa;
        }
        .mount-title {
            font-weight: 650;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: #1e293b;
            border-bottom: 2px dashed #d1d9e6;
            padding-bottom: 0.7rem;
            margin-bottom: 1.2rem;
        }
        .mount-title .var-badge {
            background: #dbeafe;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e3a8a;
            margin-left: 0.5rem;
            letter-spacing: 0.3px;
        }
        .offset-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .offset-item {
            flex: 1;
        }
        .offset-item label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .offset-item input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.9rem;
            font-size: 0.95rem;
            margin-top: 0.2rem;
            background: #ffffff;
        }
        .mount-output {
            background: #f1f4f9;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            margin-top: 0.8rem;
            border-left: 4px solid #2563eb;
        }
        .mount-output p {
            margin: 0;
            font-weight: 500;
            color: #0b3152;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.5rem 1rem;
        }
        .mount-output .coord-label {
            font-family: 'Courier New', monospace;
            background: #d9e2ef;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1f3a6b;
        }
        .mount-output .coord-number {
            font-weight: 700;
            font-size: 1.2rem;
            color: #075985;
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            border: 1px solid #b9d3fd;
        }
        .warning-note {
            background: #fffbeb;
            border-left: 5px solid #f59e0b;
            border-radius: 1rem;
            padding: 0.8rem 1.5rem;
            color: #92400e;
            font-size: 0.9rem;
            margin-top: 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .footer-note {
            text-align: right;
            color: #62748b;
            font-size: 0.8rem;
            border-top: 1px solid #d9e2ef;
            padding-top: 1.2rem;
            margin-top: 1.2rem;
        }
        .unit-cm {
            font-size: 0.75rem;
            background: #d1d9e6;
            color: #1f3a6b;
            padding: 0.15rem 0.5rem;
            border-radius: 30px;
            margin-left: 0.35rem;
        }
    </style>
</head>
<body>
    <div class="calculator" id="app">
        <h1>
            📺 挂架打孔定位器
            <small>模块化 · 可扩展</small>
        </h1>
        <div class="sub">
            ⚙️ 基于墙面、电视尺寸及挂架偏移量，自动计算电视机左下角坐标与各挂架打孔位置（原点为背景墙左下角）
        </div>

        <!-- 固定输入区：墙面/电视/H -->
        <div class="input-panel">
            <div class="flex-row">
                <div class="input-group">
                    <label>📐 背景墙长 <span class="unit-cm">cm</span></label>
                    <input type="number" id="wallLength" value="300" step="any" placeholder="如 300">
                    <div class="unit-hint">墙宽度</div>
                </div>
                <div class="input-group">
                    <label>📏 电视长度 <span class="unit-cm">cm</span></label>
                    <input type="number" id="tvLength" value="120" step="any" placeholder="如 120">
                    <div class="unit-hint">电视水平宽度</div>
                </div>
                <div class="input-group">
                    <label>⬇️ 电视底边高度 H <span class="unit-cm">cm</span></label>
                    <input type="number" id="tvH" value="60" step="any" placeholder="默认60">
                    <div class="unit-hint">离地面高度 (Y)</div>
                </div>
            </div>
        </div>

        <!-- 电视左下角坐标 (实时计算) -->
        <div class="tv-coord">
            <span>📌 电视机左下角 (X , Y) ：</span>
            <span>
                <span class="coord-value" id="tvX">90.00</span> ,
                <span class="coord-value" id="tvY">60.00</span>
                <span class="unit-cm" style="margin-left: 0.3rem;">cm</span>
            </span>
        </div>

        <!-- 挂架卡片容器 (由JS动态生成，确保可拓展) -->
        <div id="mountsContainer" class="mount-grid"></div>

        <!-- 提示区域 ／ 拓展性说明 -->
        <div class="warning-note" id="warningMessage">
            <span>ⓘ</span> 所有偏移量基于电视左下角 (X,Y) 计算。若电视比墙长，X可能为负，请复核数据。
        </div>
        <div class="footer-note">
            
        </div>
    </div>

    <script>
        (function() {
            // --- 模块：挂架配置（可任意扩展，只需遵循结构）---
            const mounts = [
                { 
                    name: '普通挂架', 
                    vxLabel: 'VX', vyLabel: 'VY', 
                    vxDefault: 25, vyDefault: 30,
                    outVar: 'X₁ , Y₁'        // 仅用于界面标识
                },
                { 
                    name: '左超薄挂架', 
                    vxLabel: 'VX₁', vyLabel: 'VY₁', 
                    vxDefault: 10, vyDefault: 20,
                    outVar: 'LX , LY' 
                },
                { 
                    name: '右超薄挂架', 
                    vxLabel: 'VX₂', vyLabel: 'VY₂', 
                    vxDefault: 40, vyDefault: 20,
                    outVar: 'RX , RY' 
                }
                // █ 未来扩展：直接在此处追加新挂架对象，界面自动生成
                // { name: '中置挂架', vxLabel: 'VX₃', vyLabel: 'VY₃', vxDefault: 15, vyDefault: 15, outVar: 'MX , MY' }
            ];

            // --- DOM 元素 ---
            const wallInput = document.getElementById('wallLength');
            const tvInput = document.getElementById('tvLength');
            const hInput = document.getElementById('tvH');
            const tvXSpan = document.getElementById('tvX');
            const tvYSpan = document.getElementById('tvY');
            const container = document.getElementById('mountsContainer');
            const warningDiv = document.getElementById('warningMessage');

            // --- 存储所有动态生成的卡片引用 (便于事件绑定, 但实际用类查询也可以) ---
            let mountCards = [];

            // --- 渲染挂架卡片 (完全基于mounts数组) ---
            function renderMountCards() {
                container.innerHTML = '';          // 清空
                mountCards = [];

                mounts.forEach((mount, index) => {
                    const card = document.createElement('div');
                    card.className = 'mount-card';
                    card.dataset.index = index;

                    // 标题行
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'mount-title';
                    titleDiv.innerHTML = `${mount.name} <span class="var-badge">${mount.outVar}</span>`;
                    card.appendChild(titleDiv);

                    // 偏移量输入行 (水平+垂直)
                    const offsetRow = document.createElement('div');
                    offsetRow.className = 'offset-row';

                    // 水平偏移
                    const vxItem = document.createElement('div');
                    vxItem.className = 'offset-item';
                    vxItem.innerHTML = `
                        <label>↔️ ${mount.vxLabel} <span class="unit-cm">cm</span></label>
                        <input type="number" class="mount-vx" value="${mount.vxDefault}" step="any" placeholder="水平">
                    `;
                    offsetRow.appendChild(vxItem);

                    // 垂直偏移
                    const vyItem = document.createElement('div');
                    vyItem.className = 'offset-item';
                    vyItem.innerHTML = `
                        <label>↕️ ${mount.vyLabel} <span class="unit-cm">cm</span></label>
                        <input type="number" class="mount-vy" value="${mount.vyDefault}" step="any" placeholder="垂直">
                    `;
                    offsetRow.appendChild(vyItem);
                    card.appendChild(offsetRow);

                    // 输出区域 (挂架左下角坐标)
                    const outDiv = document.createElement('div');
                    outDiv.className = 'mount-output';
                    outDiv.innerHTML = `
                        <p>
                            <span class="coord-label">${mount.outVar} 坐标</span>
                            <span class="coord-number" id="mount-out-x-${index}">0.00</span> ,
                            <span class="coord-number" id="mount-out-y-${index}">0.00</span>
                            <span class="unit-cm">cm</span>
                        </p>
                    `;
                    card.appendChild(outDiv);

                    container.appendChild(card);
                    mountCards.push(card);

                    // 给当前卡片内的两个输入框绑定 input 事件 (直接监听)
                    const vxInput = card.querySelector('.mount-vx');
                    const vyInput = card.querySelector('.mount-vy');
                    vxInput.addEventListener('input', updateAll);
                    vyInput.addEventListener('input', updateAll);
                });
            }

            // --- 核心更新函数：读取所有输入，计算并刷新显示 ---
            function updateAll() {
                // 1. 读取基础参数
                const wall = parseFloat(wallInput.value);
                const tv = parseFloat(tvInput.value);
                const H = parseFloat(hInput.value);

                // 有效性检查 (非数字则置为0不影响后续，但显示NaN处理)
                const validWall = isNaN(wall) ? 0 : wall;
                const validTv = isNaN(tv) ? 0 : tv;
                const validH = isNaN(H) ? 0 : H;

                // 计算电视机左下角
                const X = (validWall - validTv) / 2;
                const Y = validH;

                // 更新电视坐标显示 (保留两位小数，无效时显示 '?')
                tvXSpan.textContent = isFinite(X) ? X.toFixed(2) : '?';
                tvYSpan.textContent = isFinite(Y) ? Y.toFixed(2) : '?';

                // 2. 遍历每张卡片，计算挂架坐标
                mountCards.forEach((card, idx) => {
                    const vxInput = card.querySelector('.mount-vx');
                    const vyInput = card.querySelector('.mount-vy');

                    let vx = parseFloat(vxInput.value);
                    let vy = parseFloat(vyInput.value);
                    if (isNaN(vx)) vx = 0;
                    if (isNaN(vy)) vy = 0;

                    const mountX = X + vx;
                    const mountY = Y + vy;

                    // 更新对应的输出span
                    const outXSpan = document.getElementById(`mount-out-x-${idx}`);
                    const outYSpan = document.getElementById(`mount-out-y-${idx}`);
                    if (outXSpan) {
                        outXSpan.textContent = isFinite(mountX) ? mountX.toFixed(2) : '?';
                    }
                    if (outYSpan) {
                        outYSpan.textContent = isFinite(mountY) ? mountY.toFixed(2) : '?';
                    }
                });

                // 3. 显示警告/提示 (电视超出背景墙)
                if (validTv > validWall) {
                    warningDiv.innerHTML = `<span>⚠️</span> 电视长度 (${validTv} cm) 大于背景墙 (${validWall} cm) ，X 为负值 (${X.toFixed(2)})，请确认安装可能性。`;
                } else if (isNaN(validWall) || isNaN(validTv) || isNaN(validH)) {
                    warningDiv.innerHTML = `<span>ⓘ</span> 请输入有效的数字（支持小数）`;
                } else {
                    warningDiv.innerHTML = `<span>ⓘ</span> 所有偏移量基于电视左下角 (X,Y) 计算。当前电视居中，X = ${X.toFixed(2)} cm , Y = ${Y.toFixed(2)} cm。`;
                }
            }

            // --- 为固定输入框绑定事件 ---
            wallInput.addEventListener('input', updateAll);
            tvInput.addEventListener('input', updateAll);
            hInput.addEventListener('input', updateAll);

            // --- 初始化: 渲染卡片，并执行一次更新 ---
            renderMountCards();
            updateAll();

            // --- 可拓展: 若日后需要动态追加挂架，调用 addMount(mountObject) 并重新渲染 ---
            // 例如全局挂载一个简单方法 (但不必须)
            window.addMountDefinition = function(newMount) {
                mounts.push(newMount);
                renderMountCards();
                updateAll();
            };
        })();
    </script>
    <!-- 简洁说明：所有核心逻辑基于mounts数组，拓展只需向数组添加对象 -->
</body>
</html>
