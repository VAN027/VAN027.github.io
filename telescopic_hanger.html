<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>伸缩挂架打孔计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        canvas { border: 2px solid #e5e7eb; background: #f8fafc; }
        .input-table td { padding: 12px 8px; }
        /* 手机端优化 */
        @media (max-width: 640px) {
            h1 { font-size: 1.75rem !important; }
            h2 { font-size: 1.25rem !important; }
            .btn-mobile { font-size: 0.9rem !important; padding: 0.75rem !important; }
            canvas { max-width: 100%; height: auto !important; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-4 sm:p-6">
        <!-- 极简头部 -->
        <div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">伸缩挂架打孔计算器</h1>
                <p class="text-gray-500 text-sm mt-1">输入参数 → 自动计算 → 实时预览打孔位置</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="goToSelect()" 
                        class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded-2xl flex items-center gap-2 transition btn-mobile">
                    返回选择
                </button>
                <button onclick="resetForm()" 
                        class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded-2xl flex items-center gap-2 transition btn-mobile">
                    重置
                </button>
                <button onclick="exportResults()" 
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-2xl flex items-center gap-2 transition btn-mobile">
                    导出结果
                </button>
            </div>
        </div>

        <div class="space-y-8">
            <!-- 参数输入 -->
            <div class="bg-white rounded-3xl shadow shadow-gray-200 p-5 sm:p-7">
                <h2 class="text-xl font-semibold mb-6 text-gray-800">参数设置</h2>
                
                <!-- 基本参数 - 紧凑两列 -->
                <div class="mb-8">
                    <div class="text-xs uppercase tracking-widest text-gray-500 mb-3">基本参数</div>
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">背景墙长度 (cm)</label>
                            <input id="wall" type="number" step="0.1" value="300" 
                                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">电视机长度 (cm)</label>
                            <input id="tvLen" type="number" step="0.1" value="120" 
                                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">电视底端高度 H (cm)</label>
                            <input id="H" type="number" step="0.1" value="65" 
                                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">电视高度 (预览用 cm)</label>
                            <input id="tvHeight" type="number" step="0.1" value="80" 
                                   class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:border-blue-500 text-base"
                                   oninput="liveUpdate()">
                        </div>
                    </div>
                </div>

                <!-- 伸缩挂架偏移参数 -->
                <div class="mb-8">
                    <div class="text-xs uppercase tracking-widest text-gray-500 mb-3">伸缩挂架偏移参数</div>
                    <table class="w-full text-sm border-collapse">
                        <thead>
                            <tr class="border-b border-gray-100">
                                <th class="text-left py-3 font-medium text-gray-500">挂架类型</th>
                                <th class="text-center py-3 font-medium text-gray-500">水平偏移 (cm)</th>
                                <th class="text-center py-3 font-medium text-gray-500">垂直偏移 (cm)</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <!-- 伸缩挂架 -->
                            <tr>
                                <td class="py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-6 h-6 bg-purple-500 rounded-lg flex items-center justify-center text-white text-[10px] font-bold">伸</div>
                                        <span class="font-medium text-gray-700">伸缩挂架（VX，VY）</span>
                                    </div>
                                </td>
                                <td class="input-table"><input id="VX" type="number" step="0.1" value="45" 
                                       class="w-full px-4 py-2.5 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                       oninput="liveUpdate()"></td>
                                <td class="input-table"><input id="VY" type="number" step="0.1" value="30" 
                                       class="w-full px-4 py-2.5 border border-gray-200 rounded-2xl focus:border-blue-500 text-center text-base" 
                                       oninput="liveUpdate()"></td>
                            </tr>
                        </tbody>
                    </table>
                    <!-- 伸缩挂架测量示意图 -->
                    <div class="mt-4">
                        <div class="text-xs uppercase tracking-widest text-gray-500 mb-3">伸缩挂架测量示意图</div>
                        <div class="bg-white rounded-2xl shadow-md p-4 border border-gray-200">
                            <img src="普通挂架测量示意图.jpg" alt="伸缩挂架测量示意图" class="w-full h-auto rounded-xl object-contain">
                        </div>
                    </div>
                </div>


            </div>

            <!-- 预览 + 结果 -->
            <div class="space-y-8">
                
                <!-- 实时预览 -->
                <div class="bg-white rounded-3xl shadow shadow-gray-200 p-5 sm:p-7">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">电视已上墙正面实时预览</h2>
                        <span id="scaleInfo" class="px-4 py-1 bg-gray-100 text-xs rounded-full text-gray-500"></span>
                    </div>
                    <canvas id="canvas" width="820" height="460" class="w-full rounded-2xl"></canvas>
                    
                    <div class="flex justify-center gap-8 mt-5 text-xs">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-purple-500 rounded"></div>
                            <span>伸缩挂架 (VX/VY)</span>
                        </div>
                    </div>
                </div>

                <!-- 计算结果 -->
                <div class="bg-white rounded-3xl shadow shadow-gray-200 p-5 sm:p-7">
                    <h2 class="text-xl font-semibold mb-5 text-gray-800">计算结果</h2>
                    <div id="results" class="grid grid-cols-2 gap-5">
                        <!-- JS 动态填充 -->
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>

    <script>
        // ==================== 计算模块（不变） ====================
        function calculatePositions(wall, tvLen, H, VX, VY) {
            if (!wall || !tvLen) return null;
            const X = (wall - tvLen) / 2;
            const Y = H;
            return {
                tv: { X: X.toFixed(2), Y: Y.toFixed(2) },
                ordinary: { X1: (X + VX).toFixed(2), Y1: (Y + VY).toFixed(2) }
            };
        }

        // ==================== 可视化模块（不变） ====================
        function drawVisualization(pos, tvLen, tvHeight, wall, VX, VY) {
            if (!pos) return;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const marginL = 60, marginB = 80, drawW = canvas.width - 120, drawH = canvas.height - 120;
            const maxHeight = Math.max(parseFloat(pos.tv.Y) + parseFloat(tvHeight) + 50, 200);
            const scaleX = drawW / wall;
            const scaleY = drawH / maxHeight;
            const groundY = canvas.height - marginB;

            // 背景墙 + 地面
            ctx.fillStyle = '#f1f5f9'; ctx.fillRect(marginL, groundY - maxHeight * scaleY, drawW, maxHeight * scaleY);
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(marginL-10, groundY); ctx.lineTo(marginL+drawW+10, groundY); ctx.stroke();

            // 电视机
            const tvRefX = marginL + parseFloat(pos.tv.X) * scaleX;
            const tvBottom = groundY - parseFloat(pos.tv.Y) * scaleY;
            const tvH = parseFloat(tvHeight) * scaleY;
            const tvW = tvLen * scaleX;
            ctx.fillStyle = '#e0f2fe'; ctx.fillRect(tvRefX, tvBottom - tvH, tvW, tvH);
            ctx.strokeStyle = '#0369a1'; ctx.lineWidth = 6; ctx.strokeRect(tvRefX, tvBottom - tvH, tvW, tvH);
            ctx.fillStyle = '#0369a1'; ctx.font = 'bold 15px Noto Sans SC'; ctx.textAlign = 'center';
            ctx.fillText('电视机正面', tvRefX + tvW/2, tvBottom - tvH - 10);

            // 打孔点
            const drawPoint = (x, y, color, label) => {
                const sx = marginL + parseFloat(x) * scaleX;
                const sy = groundY - parseFloat(y) * scaleY;
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(sx, sy, 9, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(sx, sy, 9, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = '#1f2937'; ctx.font = '600 13px Noto Sans SC'; ctx.textAlign = 'left';
                ctx.fillText(label, sx + 20, sy + 5);
            };
            drawPoint(pos.ordinary.X1, pos.ordinary.Y1, '#8b5cf6', '伸缩');

            // 偏移线 + 标注（保持直观）
            const drawHLine = (startX, endX, y, color, txt) => {
                ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([5,3]);
                ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = color; ctx.font = 'bold 13px Noto Sans SC'; ctx.textAlign = 'center';
                ctx.fillText(txt, (startX + endX)/2, y - 10);
            };
            const drawVLine = (x, startY, endY, color, txt) => {
                ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([5,3]);
                ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = color; ctx.font = 'bold 13px Noto Sans SC'; ctx.textAlign = 'left';
                ctx.fillText(txt, x + 8, (startY + endY)/2);
            };

            const tvX = tvRefX;
            const ordX = marginL + parseFloat(pos.ordinary.X1)*scaleX;
            const ordY = groundY - parseFloat(pos.ordinary.Y1)*scaleY;

            drawHLine(tvX, ordX, tvBottom, '#8b5cf6', `VX=${VX}`);
            drawVLine(ordX, tvBottom, ordY, '#8b5cf6', `VY=${VY}`);

            document.getElementById('scaleInfo').textContent = `1cm ≈ ${scaleX.toFixed(1)}px`;
        }

        // ==================== 结果模块（更紧凑） ====================
        function renderResults(pos) {
            document.getElementById('results').innerHTML = `
                <div class="bg-blue-50 border border-blue-100 rounded-2xl p-5">
                    <div class="text-[10px] text-blue-600 mb-1">电视左下角</div>
                    <div class="text-4xl font-semibold text-blue-900">${pos.tv.X} <span class="text-base font-normal text-gray-400">cm</span></div>
                    <div class="text-xs text-gray-500 mt-1">Y = ${pos.tv.Y} cm</div>
                </div>
                
                <div class="bg-purple-50 border border-purple-100 rounded-2xl p-5">
                    <div class="flex gap-2 items-center mb-2">
                        <div class="w-4 h-4 bg-purple-500 rounded"></div>
                        <div class="text-xs text-purple-600">伸缩挂架</div>
                    </div>
                    <div class="text-sm space-y-1">
                        <div>X1 = ${pos.ordinary.X1} cm</div>
                        <div>Y1 = ${pos.ordinary.Y1} cm</div>
                    </div>
                </div>
            `;
        }

        // ==================== 主逻辑 ====================
        function liveUpdate() {
            const wall = parseFloat(document.getElementById('wall').value) || 0;
            const tvLen = parseFloat(document.getElementById('tvLen').value) || 0;
            const H = parseFloat(document.getElementById('H').value) || 60;
            const VX = parseFloat(document.getElementById('VX').value) || 0;
            const VY = parseFloat(document.getElementById('VY').value) || 0;
            const tvHeight = parseFloat(document.getElementById('tvHeight').value) || 65;

            const pos = calculatePositions(wall, tvLen, H, VX, VY);
            if (pos) {
                renderResults(pos);
                drawVisualization(pos, tvLen, tvHeight, wall, VX, VY);
            }
        }

        function resetForm() {
            document.getElementById('wall').value = 300;
            document.getElementById('tvLen').value = 120;
            document.getElementById('H').value = 60;
            document.getElementById('tvHeight').value = 65;
            document.getElementById('VX').value = 10;
            document.getElementById('VY').value = 15;
            liveUpdate();
        }

        function exportResults() {
            const text = `伸缩挂架打孔结果\n\n${document.getElementById('results').innerText}\n生成时间：${new Date().toLocaleString('zh-CN')}`;
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `伸缩挂架打孔_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            alert('✅ 已导出！（截图预览请使用浏览器工具）');
        }

        function goToSelect() {
            window.location.href = 'index.html';
        }

        window.onload = () => {
            // 处理URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const tvBrand = urlParams.get('brand');
            const tvModel = urlParams.get('model');
            
            liveUpdate();
            document.addEventListener('keydown', e => { if (e.key === 'Enter') liveUpdate(); });
        };
    </script>
</body>
</html>
